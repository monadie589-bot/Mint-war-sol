<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR Launchpad</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="header">
    ⚔️ WAR LAUNCHPAD
  </div>

  <div class="countdown" id="countdown">Loading...</div>

  <button class="btn" id="connectBtn">Connect Wallet</button>
  <div class="wallet" id="wallet">Not connected</div>

  <input class="input" id="amount" placeholder="Enter SOL amount" type="number">

  <div class="result" id="result">0 WAR</div>

  <button class="btn mint" id="mintBtn">Mint WAR</button>

  <div class="progress-box">
    <div class="progress-text">
      <span>Progress</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
