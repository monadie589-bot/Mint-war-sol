<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR Launchpad</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</head>

<body>

<div class="app">

  <div class="card">

    <h1>⚔️WAR⚔️</h1>
    <p class="subtitle">w̶o̶r̶l̶d̶ ̶a̶c̶t̶i̶o̶n̶ ̶r̶a̶n̶g̶e̶</p>

    <button id="walletBtn" class="btn secondary">Connect Wallet</button>
    <div id="wallet">Not connected</div>

    <div class="input-group">
      <label>Amount (SOL)</label>

      <div class="slider-row">
        <span>0.1</span>
        <input type="range" id="slider" min="0.1" max="1" step="0.01">
        <span>1</span>
      </div>

      <input id="solInput" type="number" placeholder="0.1 - 1 SOL">
    </div>

    <div class="receive">
      <span>You receive</span>
      <h2 id="warAmount">0 WAR</h2>
    </div>

    <button id="mintBtn" class="btn primary">Mint WAR</button>

    <div class="progress">
      <div id="fill"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 100 SOL</div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
