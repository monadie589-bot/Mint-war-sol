<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR Mint</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</head>
<body>

<div class="wrapper">
  <div class="card">

    <h1>⚔ WAR</h1>

    <button id="walletBtn">CONNECT WALLET</button>
    <div id="wallet">Not connected</div>

    <div class="amountBox">
      <span>0.1</span>
      <input type="range" min="0.1" max="1" step="0.1" id="slider">
      <span>1</span>
    </div>

    <input type="number" id="solInput" placeholder="Enter SOL">

    <div class="receive">
      YOU RECEIVE
      <h2 id="warAmount">0 WAR</h2>
    </div>

    <button id="mintBtn">MINT WAR</button>

    <div class="progress">
      <p id="progressText">0 / 500 SOL</p>
      <div class="bar">
        <div id="fill"></div>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
