<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR GAME UI</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</head>

<body>

<div class="bg"></div>

<div class="game">

  <div class="frame">

    <h1>⚔ WAR ⚔</h1>

    <button id="walletBtn" class="btn connect">
      <span>CONNECT</span>
    </button>

    <div id="wallet">Not connected</div>

    <div class="sliderBox">
      <span>0.1</span>
      <input type="range" id="slider" min="0.1" max="1" step="0.1">
      <span>1</span>
    </div>

    <div class="inputWrap">
      <input type="number" id="solInput" placeholder="ENTER SOL">
    </div>

    <div class="receive">
      <p>YOU GET</p>
      <h2 id="warAmount">0 WAR</h2>
    </div>

    <button id="mintBtn" class="btn mint">
      <span>MINT WAR</span>
    </button>

    <div class="progress">
      <div id="fill"></div>
    </div>

    <p id="progressText">0 / 100 SOL</p>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
