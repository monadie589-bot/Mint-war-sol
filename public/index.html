<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WAR Launchpad</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="overlay"></div>

<div class="container">

  <h1>⚔️ WAR LAUNCHPAD</h1>

  <button id="walletBtn">Connect Wallet</button>
  <p id="walletAddress">Not connected</p>

  <input type="number" id="amount" placeholder="Enter SOL amount" min="0.1" max="1" step="0.1"/>

  <p id="warAmount">0 WAR</p>

  <button id="mintBtn">Mint WAR</button>

  <div class="progressBox">
    <div id="progressBar"></div>
  </div>

  <p id="status">Idle</p>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

</body>
</html>
